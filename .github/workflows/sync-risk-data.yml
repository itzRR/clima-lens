name: 🌍 ClimaLens Risk Data Sync

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  sync-risk-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install scikit-learn
          python -m pip install xgboost numpy pandas requests supabase python-dotenv
          python -c "import sklearn; print('sklearn OK:', sklearn.__version__)"
          python -c "import xgboost; print('xgboost OK:', xgboost.__version__)"

      - name: 🌦️ Run Live Data Sync (Weather + AI Risk)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          EXPO_PUBLIC_TELEGRAM_BOT_TOKEN: ${{ secrets.EXPO_PUBLIC_TELEGRAM_BOT_TOKEN }}
          EXPO_PUBLIC_TELEGRAM_CHAT_ID: ${{ secrets.EXPO_PUBLIC_TELEGRAM_CHAT_ID }}
        working-directory: ai_backend
        run: python run_real_data_sync.py

      - name: 🚨 Alert Telegram on Failure
        if: failure()
        env:
          EXPO_PUBLIC_TELEGRAM_BOT_TOKEN: ${{ secrets.EXPO_PUBLIC_TELEGRAM_BOT_TOKEN }}
          EXPO_PUBLIC_TELEGRAM_CHAT_ID: ${{ secrets.EXPO_PUBLIC_TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${EXPO_PUBLIC_TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${EXPO_PUBLIC_TELEGRAM_CHAT_ID}\", \"text\": \"🚨 <b>GitHub Action FAILED!</b>\n\n<b>Workflow:</b> 🌍 Risk Data Sync\n<b>Time:</b> $(date -u '+%Y-%m-%d %H:%M UTC')\n<b>Run:</b> ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\nPlease check the logs immediately!\", \"parse_mode\": \"HTML\"}"
