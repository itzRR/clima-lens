name: ☀️ ClimaLens Daily Weather Push

on:
  schedule:
    - cron: '0 1 * * *'   # 1:00 AM UTC = 6:30 AM Sri Lanka Time
  workflow_dispatch:

jobs:
  send-daily-weather:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests supabase python-dotenv

      - name: 📬 Send Daily Weather Notifications
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          EXPO_PUBLIC_TELEGRAM_BOT_TOKEN: ${{ secrets.EXPO_PUBLIC_TELEGRAM_BOT_TOKEN }}
          EXPO_PUBLIC_TELEGRAM_CHAT_ID: ${{ secrets.EXPO_PUBLIC_TELEGRAM_CHAT_ID }}
        working-directory: ai_backend
        run: python send_daily_weather.py
