name: ☀️ ClimaLens Daily Weather Push

on:
  schedule:
    - cron: '47 0 * * *'   # 12:47 AM UTC = 6:17 AM Sri Lanka Time (off-peak minute to avoid GitHub delays)
  workflow_dispatch:

jobs:
  send-daily-weather:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests supabase python-dotenv

      - name: 📬 Send Daily Weather Notifications
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          EXPO_PUBLIC_TELEGRAM_BOT_TOKEN: ${{ secrets.EXPO_PUBLIC_TELEGRAM_BOT_TOKEN }}
          EXPO_PUBLIC_TELEGRAM_CHAT_ID: ${{ secrets.EXPO_PUBLIC_TELEGRAM_CHAT_ID }}
        working-directory: ai_backend
        run: python send_daily_weather.py

      - name: 🚨 Alert Telegram on Failure
        if: failure()
        env:
          EXPO_PUBLIC_TELEGRAM_BOT_TOKEN: ${{ secrets.EXPO_PUBLIC_TELEGRAM_BOT_TOKEN }}
          EXPO_PUBLIC_TELEGRAM_CHAT_ID: ${{ secrets.EXPO_PUBLIC_TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${EXPO_PUBLIC_TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${EXPO_PUBLIC_TELEGRAM_CHAT_ID}\", \"text\": \"🚨 <b>GitHub Action FAILED!</b>\n\n<b>Workflow:</b> ☀️ Daily Weather Push\n<b>Time:</b> $(date -u '+%Y-%m-%d %H:%M UTC')\n<b>Run:</b> ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\nPlease check the logs immediately!\", \"parse_mode\": \"HTML\"}"
